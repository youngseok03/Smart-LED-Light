<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #152033; }
      .label { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .small { font: 600 17px Arial, sans-serif; fill: #334155; }
      .note { font: 600 18px Arial, sans-serif; fill: #475569; }
      .hole { fill: #eef2f7; stroke: #b9c3d1; stroke-width: 1.2; }
      .rail-red { stroke: #ef4444; stroke-width: 5; }
      .rail-blue { stroke: #2563eb; stroke-width: 5; }
      .wire { fill: none; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
      .vo { stroke: #f59e0b; }
      .d35 { stroke: #22c55e; }
      .gnd { stroke: #111827; }
      .body { fill: #f8fafc; stroke: #94a3b8; stroke-width: 3; }
      .node { fill: #dc2626; stroke: #fff; stroke-width: 4; }
      .resistor { fill: #9cc8e8; stroke: #1e3a8a; stroke-width: 3; }
      .res-band { stroke-width: 9; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="#f6f8fb"/>
  <text x="70" y="62" class="title">Dust Sensor Vo → ESP32 D35 Voltage Divider</text>
  <text x="70" y="96" class="note">먼지센서 5번 Vo 아날로그 출력만 이 회로로 낮춰서 ESP32 ADC(D35)에 넣습니다.</text>

  <!-- Breadboard -->
  <rect x="90" y="145" width="980" height="560" rx="28" class="body"/>
  <line x1="125" y1="198" x2="1035" y2="198" class="rail-red"/>
  <line x1="125" y1="238" x2="1035" y2="238" class="rail-blue"/>
  <text x="1085" y="205" class="label" fill="#ef4444">+ rail 안 씀</text>
  <text x="1085" y="245" class="label" fill="#2563eb">GND rail</text>

  <!-- Main breadboard channel -->
  <rect x="118" y="302" width="920" height="310" rx="12" fill="#fff" stroke="#d1d9e6" stroke-width="3"/>
  <rect x="574" y="302" width="38" height="310" fill="#e5e7eb"/>

  <!-- Holes -->
  <g>
    <!-- left side columns -->
    <g>
      <circle class="hole" cx="155" cy="342" r="8"/><circle class="hole" cx="195" cy="342" r="8"/><circle class="hole" cx="235" cy="342" r="8"/><circle class="hole" cx="275" cy="342" r="8"/><circle class="hole" cx="315" cy="342" r="8"/>
      <circle class="hole" cx="155" cy="382" r="8"/><circle class="hole" cx="195" cy="382" r="8"/><circle class="hole" cx="235" cy="382" r="8"/><circle class="hole" cx="275" cy="382" r="8"/><circle class="hole" cx="315" cy="382" r="8"/>
      <circle class="hole" cx="155" cy="422" r="8"/><circle class="hole" cx="195" cy="422" r="8"/><circle class="hole" cx="235" cy="422" r="8"/><circle class="hole" cx="275" cy="422" r="8"/><circle class="hole" cx="315" cy="422" r="8"/>
      <circle class="hole" cx="155" cy="462" r="8"/><circle class="hole" cx="195" cy="462" r="8"/><circle class="hole" cx="235" cy="462" r="8"/><circle class="hole" cx="275" cy="462" r="8"/><circle class="hole" cx="315" cy="462" r="8"/>
      <circle class="hole" cx="155" cy="502" r="8"/><circle class="hole" cx="195" cy="502" r="8"/><circle class="hole" cx="235" cy="502" r="8"/><circle class="hole" cx="275" cy="502" r="8"/><circle class="hole" cx="315" cy="502" r="8"/>
      <circle class="hole" cx="155" cy="542" r="8"/><circle class="hole" cx="195" cy="542" r="8"/><circle class="hole" cx="235" cy="542" r="8"/><circle class="hole" cx="275" cy="542" r="8"/><circle class="hole" cx="315" cy="542" r="8"/>
    </g>
    <!-- middle left -->
    <g>
      <circle class="hole" cx="365" cy="342" r="8"/><circle class="hole" cx="405" cy="342" r="8"/><circle class="hole" cx="445" cy="342" r="8"/><circle class="hole" cx="485" cy="342" r="8"/><circle class="hole" cx="525" cy="342" r="8"/>
      <circle class="hole" cx="365" cy="382" r="8"/><circle class="hole" cx="405" cy="382" r="8"/><circle class="hole" cx="445" cy="382" r="8"/><circle class="hole" cx="485" cy="382" r="8"/><circle class="hole" cx="525" cy="382" r="8"/>
      <circle class="hole" cx="365" cy="422" r="8"/><circle class="hole" cx="405" cy="422" r="8"/><circle class="hole" cx="445" cy="422" r="8"/><circle class="hole" cx="485" cy="422" r="8"/><circle class="hole" cx="525" cy="422" r="8"/>
      <circle class="hole" cx="365" cy="462" r="8"/><circle class="hole" cx="405" cy="462" r="8"/><circle class="hole" cx="445" cy="462" r="8"/><circle class="hole" cx="485" cy="462" r="8"/><circle class="hole" cx="525" cy="462" r="8"/>
      <circle class="hole" cx="365" cy="502" r="8"/><circle class="hole" cx="405" cy="502" r="8"/><circle class="hole" cx="445" cy="502" r="8"/><circle class="hole" cx="485" cy="502" r="8"/><circle class="hole" cx="525" cy="502" r="8"/>
      <circle class="hole" cx="365" cy="542" r="8"/><circle class="hole" cx="405" cy="542" r="8"/><circle class="hole" cx="445" cy="542" r="8"/><circle class="hole" cx="485" cy="542" r="8"/><circle class="hole" cx="525" cy="542" r="8"/>
    </g>
    <!-- right side -->
    <g>
      <circle class="hole" cx="665" cy="342" r="8"/><circle class="hole" cx="705" cy="342" r="8"/><circle class="hole" cx="745" cy="342" r="8"/><circle class="hole" cx="785" cy="342" r="8"/><circle class="hole" cx="825" cy="342" r="8"/>
      <circle class="hole" cx="665" cy="382" r="8"/><circle class="hole" cx="705" cy="382" r="8"/><circle class="hole" cx="745" cy="382" r="8"/><circle class="hole" cx="785" cy="382" r="8"/><circle class="hole" cx="825" cy="382" r="8"/>
      <circle class="hole" cx="665" cy="422" r="8"/><circle class="hole" cx="705" cy="422" r="8"/><circle class="hole" cx="745" cy="422" r="8"/><circle class="hole" cx="785" cy="422" r="8"/><circle class="hole" cx="825" cy="422" r="8"/>
      <circle class="hole" cx="665" cy="462" r="8"/><circle class="hole" cx="705" cy="462" r="8"/><circle class="hole" cx="745" cy="462" r="8"/><circle class="hole" cx="785" cy="462" r="8"/><circle class="hole" cx="825" cy="462" r="8"/>
      <circle class="hole" cx="665" cy="502" r="8"/><circle class="hole" cx="705" cy="502" r="8"/><circle class="hole" cx="745" cy="502" r="8"/><circle class="hole" cx="785" cy="502" r="8"/><circle class="hole" cx="825" cy="502" r="8"/>
      <circle class="hole" cx="665" cy="542" r="8"/><circle class="hole" cx="705" cy="542" r="8"/><circle class="hole" cx="745" cy="542" r="8"/><circle class="hole" cx="785" cy="542" r="8"/><circle class="hole" cx="825" cy="542" r="8"/>
    </g>
  </g>

  <!-- Components: voltage divider -->
  <path d="M95 422 H270" class="wire vo"/>
  <text x="70" y="405" class="label" fill="#f59e0b">먼지센서 5번 Vo</text>

  <!-- R1 10k from Vo row to node row -->
  <path d="M270 422 H355" class="wire vo"/>
  <rect x="355" y="398" width="150" height="48" rx="18" class="resistor"/>
  <line x1="385" y1="400" x2="385" y2="446" stroke="#7c2d12" class="res-band"/>
  <line x1="420" y1="400" x2="420" y2="446" stroke="#0f172a" class="res-band"/>
  <line x1="455" y1="400" x2="455" y2="446" stroke="#f97316" class="res-band"/>
  <line x1="490" y1="400" x2="490" y2="446" stroke="#d4af37" class="res-band"/>
  <path d="M505 422 H665" class="wire vo"/>
  <text x="363" y="382" class="label">R1 10kΩ</text>

  <!-- Junction -->
  <circle cx="665" cy="422" r="18" class="node"/>
  <text x="628" y="392" class="small">분기점</text>

  <!-- D35 wire -->
  <path d="M665 422 C760 350 870 315 1000 315" class="wire d35"/>
  <text x="920" y="300" class="label" fill="#16a34a">ESP32 D35</text>

  <!-- R2 to GND -->
  <path d="M665 422 V492" class="wire gnd"/>
  <rect x="641" y="492" width="48" height="130" rx="17" class="resistor"/>
  <line x1="643" y1="515" x2="689" y2="515" stroke="#ef4444" class="res-band"/>
  <line x1="643" y1="545" x2="689" y2="545" stroke="#0f172a" class="res-band"/>
  <line x1="643" y1="575" x2="689" y2="575" stroke="#f97316" class="res-band"/>
  <line x1="643" y1="605" x2="689" y2="605" stroke="#d4af37" class="res-band"/>
  <path d="M665 622 C665 660 590 680 450 680 C315 680 240 650 240 238" class="wire gnd"/>
  <text x="703" y="564" class="label">R2 20kΩ</text>
  <text x="210" y="218" class="label" fill="#111827">GND rail</text>

  <!-- Explanation box -->
  <rect x="1110" y="360" width="235" height="230" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="1132" y="397" class="label">연결 요약</text>
  <text x="1132" y="435" class="small">Vo → R1 10kΩ → 분기점</text>
  <text x="1132" y="466" class="small">분기점 → ESP32 D35</text>
  <text x="1132" y="497" class="small">분기점 → R2 20kΩ → GND</text>
  <text x="1132" y="538" class="small">5V 입력이 약 3.3V로</text>
  <text x="1132" y="568" class="small">낮아집니다.</text>

  <text x="70" y="760" class="note">주의: 사진 속 150Ω 저항과 커패시터는 Vled 전원 안정화용입니다. Vo→D35 보호에는 위의 10kΩ/20kΩ 전압분배가 따로 필요합니다.</text>
</svg>
